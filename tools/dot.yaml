global:
  links:
    sshconfig: ~/.ssh/config
    rsync-excludes: ~/.config/.rsync-excludes
    ansiweatherrc: ~/.ansiweatherrc
    rubocop.yml: ~/.rubocop.yml
    starship.toml: ~/.config/starship.toml
    tmux.conf: ~/.config/tmux/tmux.conf
    herdr.toml: ~/.config/herdr/config.toml
    yazi/yazi.toml: ~/.config/yazi/yazi.toml
    yazi/keymap.toml: ~/.config/yazi/keymap.toml
    yazi/theme.toml: ~/.config/yazi/theme.toml
    yazi/package.toml: ~/.config/yazi/package.toml
    yazi/init.lua: ~/.config/yazi/init.lua
    yazi/vfs.toml: ~/.config/yazi/vfs.toml
    mpv/mpv.conf: ~/.config/mpv/mpv.conf
    mpv/input.conf: ~/.config/mpv/input.conf
    agents/simple.md: ~/.config/opencode/agents
    skills/matlab-performance-optimizer/: ~/.agents/skills/matlab-performance-optimizer
    skills/matlab-class-based-tests/: ~/.agents/skills/matlab-class-based-tests
darwin:
  links:
    clash.yaml: "~/Library/Application Support/io.github.clash-verge-rev.clash-verge-rev/profiles/Merge.yaml"
linux:
  links:
    clash.yaml: ~/.local/share/io.github.clash-verge-rev.clash-verge-rev/profiles/Merge.yaml
  installs: |
    sudo apt install -y curl git ripgrep fd-find
windows:
  installs: |
    winget install Microsoft.PowerShell
    powershell -ExecutionPolicy ByPass -c "irm -useb https://pixi.sh/install.ps1 | iex"
    irm volllly.github.io/rotz/install.sh | iex
linux[whoami.distro^="Raspberry"]:
  links:
    starshiprpi.toml: ~/.config/starship.toml
